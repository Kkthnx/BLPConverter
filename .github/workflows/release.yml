name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate app icons
        run: npx tauri icon app-icon-square.png -o src-tauri/icons

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: BLP Converter ${{ github.ref_name }}
          releaseBody: |
            ## What's new in 1.1.1

            - Fix BLPView Explorer thumbnails on Windows (`DisableProcessIsolation`, FileExts registration, thumb cache refresh)
            - Grey out BLPView on Linux/macOS with an explanation
            - Fix Windows release CI file-lock when bundling the thumbnail DLL

            [Full changelog](https://github.com/Kkthnx/BLPConverter/blob/main/CHANGELOG.md#111---2026-06-23)

            ## Downloads

            | Platform | Installers |
            |----------|------------|
            | **Windows** | `*-setup.exe` (recommended), `*.msi` — includes optional BLPView Explorer thumbnails |
            | **Linux** | `*.deb`, `*.AppImage` |
            | **macOS** | `*.dmg` (Intel and Apple Silicon builds) |

            See [README](https://github.com/Kkthnx/BLPConverter#download) for usage.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
